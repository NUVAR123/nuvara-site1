<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НУВАРА — Виртуальный альянс</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            
        background-image: url("ChatGPT Image 24 июл. 2026 г., 00_17_57.png");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
        }

        .container {
            width: 90%;
            max-width: 700px;
            padding: 40px 20px;
        }

        .logo {
            width: 180px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 52px;
            letter-spacing: 8px;
            margin: 10px 0;
        }

        .subtitle {
            color: #ffffff;
            font-size: 18px;
            letter-spacing: 3px;
            margin-bottom: 35px;
        }

        .description {
            color: #aaaaaa;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .button {
            display: inline-block;
            padding: 16px 35px;
            background: #f5c400;
            color: #050505;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 5px;
            transition: 0.2s;
        }

        .button:hover {
            background: #ffffff;
            transform: scale(1.05);
        }

        .status {
            margin-top: 35px;
            color: #666666;
            font-size: 13px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Если у тебя есть логотип, потом можно добавить его сюда -->

        <h1>НУВАРА</h1>

        <div class="subtitle">
            ВИРТУАЛЬНЫЙ АЛЬЯНС
        </div>

        <div class="description">
            Добро пожаловать на территорию НУВАРА.<br>
            Общение. Сообщество. Альянс.
        </div>

        <!-- ЗАМЕНИ ССЫЛКУ НИЖЕ НА СВОЮ ССЫЛКУ DISCORD -->
        <a class="button" href="https://discord.gg/ТВОЯ_ССЫЛКА" target="_blank">
            ВОЙТИ В DISCORD
        </a>

        <div class="status">
            СИСТЕМА НУВАРА АКТИВНА
        </div>

    </div>

</body>
</html>
